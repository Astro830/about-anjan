<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>About Me</title>
  <style>
    :root {
      --main-bg: #f5f6fa;
      --primary: #22223b;
      --accent: #4ea8de;
      --card-bg: #fff;
      --shadow: rgba(34, 34, 59, 0.07) 0 4px 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--main-bg);
      color: var(--primary);
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: var(--card-bg);
      box-shadow: var(--shadow);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 100%;
      margin: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 1s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px);}
      to { opacity: 1; transform: translateY(0);}
    }

    .avatar {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid var(--accent);
      box-shadow: 0 2px 8px rgba(78,168,222,0.15);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -1px;
    }

    h2 {
      font-size: 1.12rem;
      color: var(--accent);
      margin: 0.5rem 0 1.5rem 0;
      font-weight: 500;
    }

    p.bio {
      text-align: center;
      margin-bottom: 1.8rem;
      color: #444;
      line-height: 1.6;
    }

    .links {
      display: flex;
      gap: 1rem;
    }

    .links a {
      background: var(--accent);
      color: #fff;
      padding: 0.65rem 1.1rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1rem;
      transition: background 0.18s;
      font-weight: 500;
    }
    .links a:hover {
      background: #22223b;
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    @media (max-width: 500px) {
      .container {
        padding: 2rem 1rem;
        max-width: 95vw;
      }
      .avatar {
        width: 90px;
        height: 90px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="avatar" src="anjan.jpg" alt="Your Photo">
    <h1>Anjan</h1>
    <h2>Owner of Prosports100plus</h2>
    <p class="bio">
      Hi! I'm <b>Anjan</b>, the Owner of Prosports100plus and a sports enthusiast. I love working on tech, learning new things, and connecting with people. My interests include web development and AI. Let's connect!
    </p>
    <div class="links">
      <a href="mailto:Prosports100plus@gmail.com">Email</a>
    </div>
  </div>
</body>
</html>
